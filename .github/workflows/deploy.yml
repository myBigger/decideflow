name: 🚀 Deploy DecideFlow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Lint & Type Check
  # ──────────────────────────────────────────────
  quality:
    name: 🔍 Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔎 TypeScript check
        run: npx tsc --noEmit

      - name: ✨ ESLint check
        run: npx next lint --dir src

  # ──────────────────────────────────────────────
  # Job 2: Build
  # ──────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 📁 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            build/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 3: Deploy to Vercel (Production)
  # ──────────────────────────────────────────────
  deploy-production:
    name: 🌐 Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      - name: 💬 Comment deployment URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Dec ideFlow 已部署至生产环境！**\n\n' +
                    '🔗 访问地址: ${{ steps.deploy.outputs.url }}\n' +
                    '📊 环境: Production'
            })

  # ──────────────────────────────────────────────
  # Job 4: Deploy Preview (Pull Requests)
  # ──────────────────────────────────────────────
  deploy-preview:
    name: 🔍 Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Deploy Preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: true
          working-directory: ./

      - name: 📝 Set deployment URL output
        run: echo "preview_url=$(echo ${{ steps.preview.outputs.url }})" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────
  # Job 5: Supabase DB Migration (on main)
  # ──────────────────────────────────────────────
  migrate-db:
    name: 🗄️ Supabase DB Migration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🗄️ Run Supabase migrations
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🔐 Authenticate with Supabase
        run: |
          supabase login --token ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 🔄 Link Supabase project
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: ⬆️ Push migrations
        run: supabase db push
        env:
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: ✅ Migration completed
        run: echo "✅ Supabase migration completed successfully"
